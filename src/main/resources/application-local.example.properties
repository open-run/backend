spring.datasource.url=jdbc:mysql://127.0.0.1:3307/openuR_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=openuR_user
spring.datasource.password=openuR_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Profile images are uploaded to / served from GCS bucket gs://openrun-nft.
# Authenticate once for local development: `gcloud auth application-default login`.
openrun.gcs.bucket=openrun-nft
openrun.gcs.public-base-url=https://storage.googleapis.com/openrun-nft

# NFT catalog images are served from a Swarm public gateway (read-only).
nft.swarm-gateway-url=https://api.gateway.ethswarm.org
